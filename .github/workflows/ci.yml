name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Build-time placeholders. proxy.ts requires these to be set; real values are
# injected at deploy time, never baked into the image.
env:
  BACKEND_URL: http://placeholder:8000
  APP_API_TOKEN: ci-placeholder-token

jobs:
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      # npm resolves `github:` dependencies via git.
      # If GH_PAT secret is set, use it for authenticated HTTPS (works for private repos).
      # Otherwise fall back to plain HTTPS (works when core-fe is public).
      - name: Configure git for GitHub dependencies
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -n "$GH_PAT" ]; then
            git config --global url."https://x-access-token:${GH_PAT}@github.com/".insteadOf "https://github.com/"
            git config --global url."https://x-access-token:${GH_PAT}@github.com/".insteadOf "git@github.com:"
            git config --global url."https://x-access-token:${GH_PAT}@github.com/".insteadOf "ssh://git@github.com/"
          else
            git config --global url."https://github.com/".insteadOf "git@github.com:"
            git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          fi

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      # Advisory: `next lint` is being phased out, so a finding here does not gate.
      - name: Lint
        continue-on-error: true
        run: npm run lint

      - name: Build
        run: npm run build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Configure git for GitHub dependencies
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -n "$GH_PAT" ]; then
            git config --global url."https://x-access-token:${GH_PAT}@github.com/".insteadOf "https://github.com/"
            git config --global url."https://x-access-token:${GH_PAT}@github.com/".insteadOf "git@github.com:"
            git config --global url."https://x-access-token:${GH_PAT}@github.com/".insteadOf "ssh://git@github.com/"
          else
            git config --global url."https://github.com/".insteadOf "git@github.com:"
            git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          fi

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # The Playwright config's webServer builds and starts the app itself.
      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [build, e2e]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: false
          tags: assistent-fe:ci
          build-args: |
            BACKEND_URL=${{ env.BACKEND_URL }}
            APP_API_TOKEN=${{ env.APP_API_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
